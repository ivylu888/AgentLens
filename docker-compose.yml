version: '3.8'

services:
  # --- MinIO (Local S3 Storage) ---
  minio:
    image: minio/minio:latest
    container_name: knowledge_factory_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: supersecretpassword
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- MinIO Provisioning (Auto-create Buckets) ---
  minio-create-buckets:
    image: minio/mc:latest
    container_name: minio_bucket_initializer
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 admin supersecretpassword;
      /usr/bin/mc mb --ignore-existing myminio/knowledge-factory;
      echo 'Buckets created successfully!';
      "

  # --- PySpark Master (Aligned to Python 3.11/3.12 variant) ---
  spark-master:
    image: jupyter/pyspark-notebook:spark-3.5.0
    container_name: knowledge_factory_spark_master
    ports:
      - "8080:8080"
      - "7077:7077"
    environment:
      - PYSPARK_PYTHON=/opt/conda/bin/python3
    entrypoint: ["/usr/local/spark-3.5.0-bin-hadoop3/bin/spark-class", "org.apache.spark.deploy.master.Master"]

  spark-worker:
    image: jupyter/pyspark-notebook:spark-3.5.0
    container_name: knowledge_factory_spark_worker
    depends_on:
      - spark-master
    environment:
      - PYSPARK_PYTHON=/opt/conda/bin/python3
      - SPARK_WORKER_DIR=/tmp/spark-work
    entrypoint: ["/usr/local/spark-3.5.0-bin-hadoop3/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]

  # --- Prefect Server ---
  prefect-server:
    image: prefecthq/prefect:3.7.4-python3.11
    container_name: prefect-server
    volumes:
      - prefect_data:/root/.prefect
    environment:
      - PREFECT_API_URL=http://localhost:4200/api
      - PREFECT_SERVER_API_HOST=0.0.0.0
    ports:
      - "4200:4200"
      
    command: prefect server start

# Declare two global volumes simultaneously to fix the undefined volume error.
volumes:
  prefect_data:
  minio_data: